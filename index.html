<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mustafa Plinko Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="brand">MUSTAFA <span class="neon-text">DEV</span></div>
            <div class="wallet">
                <small>USD</small> <span id="balance">1,000.00</span>
            </div>
        </header>

        <main id="game-canvas-area"></main>

        <section class="controls-panel">
            <div class="bet-box">
                <div class="stepper">
                    <button onclick="ui.adjustBet(-5)">−</button>
                    <div class="bet-display">
                        <small>BET AMOUNT</small>
                        <span id="betAmount">10</span>
                    </div>
                    <button onclick="ui.adjustBet(5)">+</button>
                </div>
                <button class="main-action-btn" id="drop-btn">PLAY</button>
            </div>
        </section>
    </div>

    <script src="system.js"></script>
    <script src="ui.js"></script>
</body>
</html>
