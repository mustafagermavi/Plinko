<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Plinko Premium</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>
    <div class="app-wrapper">
        <div class="glass-header">
            <div class="wallet-info">
                <div class="balance-container">
                    <span id="balance">1000.00</span>
                    <small>USD</small>
                </div>
            </div>
            <div class="game-status" id="winNotice">READY</div>
        </div>

        <div id="game-area"></div>

        <div class="control-center">
            <div class="bet-panel">
                <div class="input-group">
                    <button class="adj-btn" onclick="changeBet(-5)">-</button>
                    <div class="bet-value">
                        <small>بڕی گرەو</small>
                        <span id="betAmount">10</span>
                    </div>
                    <button class="adj-btn" onclick="changeBet(5)">+</button>
                </div>
                <button id="drop-btn" class="main-action">
                    <span class="btn-text">BET</span>
                    <div class="btn-glow"></div>
                </button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
