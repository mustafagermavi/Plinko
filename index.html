<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PLINKO CASINO</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="game">

<div class="top">
Pins: 14
</div>

<canvas id="board"></canvas>

<div class="multipliers" id="multipliers"></div>

<div class="controls">

<button onclick="setRisk('green')" class="green">GREEN</button>
<button onclick="setRisk('yellow')" class="yellow">YELLOW</button>
<button onclick="setRisk('red')" class="red">RED</button>

</div>

<div class="bet">

<button onclick="betMinus()">-</button>
<span id="bet">0.30</span>
<button onclick="betPlus()">+</button>

<button onclick="dropBall()">PLAY</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
