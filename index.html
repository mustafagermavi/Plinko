<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plinko Pro Max</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="stats-bar">
            <div class="stat">BALANCE: <span id="balance">1000</span>$</div>
            <div class="stat">WIN: <span id="lastWin">0</span></div>
        </div>
        
        <div id="game-area"></div>

        <div class="control-panel">
            <div class="bet-input">
                <button onclick="changeBet(-10)">-</button>
                <span id="betAmount">10</span>
                <button onclick="changeBet(10)">+</button>
            </div>
            <button id="drop-btn">PLAY / DROP</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
